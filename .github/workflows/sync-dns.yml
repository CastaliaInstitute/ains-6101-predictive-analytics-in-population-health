name: Sync Cloudflare DNS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/cf-dns-ains6003-github-pages.sh
      - .github/workflows/sync-dns.yml

permissions:
  contents: read

jobs:
  dns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply proxied CNAME (ains6003.courses)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PROXIED: "true"
        run: bash scripts/cf-dns-ains6003-github-pages.sh
